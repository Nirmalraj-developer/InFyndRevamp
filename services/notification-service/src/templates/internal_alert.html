<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; background: #f9f9f9; }
    .alert { background: white; padding: 20px; border-left: 4px solid {{primaryColor}}; }
    .info { margin: 10px 0; }
    .label { font-weight: bold; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="alert">
      <h3>🎉 New User Registration</h3>
      <div class="info">
        <span class="label">Email:</span> {{email}}
      </div>
      <div class="info">
        <span class="label">Tenant:</span> {{tenantId}}
      </div>
      <div class="info">
        <span class="label">Hostname:</span> {{hostname}}
      </div>
      <div class="info">
        <span class="label">Time:</span> {{timestamp}}
      </div>
      <div class="info">
        <span class="label">User ID:</span> {{userId}}
      </div>
      <div class="info">
        <span class="label">Cognito ID:</span> {{cognitoUserId}}
      </div>
    </div>
  </div>
</body>
</html>
