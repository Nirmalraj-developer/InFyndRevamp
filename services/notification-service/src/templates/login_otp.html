<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 20px 0; border-bottom: 3px solid {{primaryColor}}; }
    .logo { max-width: 150px; }
    .content { padding: 30px 0; text-align: center; }
    .otp-box { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
    .otp-code { font-size: 32px; font-weight: bold; letter-spacing: 5px; color: {{primaryColor}}; }
    .warning { color: #e74c3c; font-size: 14px; margin-top: 20px; }
    .footer { text-align: center; padding: 20px 0; border-top: 1px solid #ddd; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="{{logoUrl}}" alt="{{companyName}}" class="logo">
    </div>
    <div class="content">
      <h2>Your Login Code</h2>
      <p>Use the following code to log in to your {{companyName}} account:</p>
      <div class="otp-box">
        <div class="otp-code">{{otp}}</div>
      </div>
      <p>This code will expire in <strong>5 minutes</strong>.</p>
      <p class="warning">⚠️ If you didn't request this code, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>&copy; 2024 {{companyName}}. All rights reserved.</p>
      <p>Need help? Contact us at <a href="mailto:{{supportEmail}}">{{supportEmail}}</a></p>
    </div>
  </div>
</body>
</html>
