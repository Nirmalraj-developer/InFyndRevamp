services:
  # ==================== API Gateway (2 Replicas) ====================
  api-gateway-1:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway-1
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=api-gateway-1
      - AUTH_SERVICE_URL=http://auth-service-1:3001,http://auth-service-2:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service-1:3002,http://notification-service-2:3002
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    ports:
      - "3000:3000"
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-gateway-2:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway-2
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=api-gateway-2
      - AUTH_SERVICE_URL=http://auth-service-1:3001,http://auth-service-2:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service-1:3002,http://notification-service-2:3002
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ==================== Auth Service (2 Replicas) ====================
  auth-service-1:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service-1
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - SERVICE_NAME=auth-service-1
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-true}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - MONGO_URI=mongodb://infynd_app:infynd_app_password@mongo-primary:27017,mongo-secondary:27017,mongo-arbiter:27017/${MONGO_DB_NAME}?replicaSet=rs0&authSource=infynd
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    depends_on:
      mongo-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  auth-service-2:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service-2
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - SERVICE_NAME=auth-service-2
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-true}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - MONGO_URI=mongodb://infynd_app:infynd_app_password@mongo-primary:27017,mongo-secondary:27017,mongo-arbiter:27017/${MONGO_DB_NAME}?replicaSet=rs0&authSource=infynd
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    depends_on:
      mongo-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==================== Notification Service (2 Replicas) ====================
  notification-service-1:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service-1
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - SERVICE_NAME=notification-service-1
      - MONGO_URI=mongodb://mongo-primary:27017,mongo-secondary:27017,mongo-arbiter:27017/${MONGO_DB_NAME}?replicaSet=rs0&authSource=admin
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_GROUP_ID=notification-service-group
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    depends_on:
      mongo-primary:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  notification-service-2:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service-2
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - SERVICE_NAME=notification-service-2
      - MONGO_URI=mongodb://mongo-primary:27017,mongo-secondary:27017,mongo-arbiter:27017/${MONGO_DB_NAME}?replicaSet=rs0&authSource=admin
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_GROUP_ID=notification-service-group
      - UV_THREADPOOL_SIZE=128
      - NODE_OPTIONS=--max-old-space-size=2048
    depends_on:
      mongo-primary:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==================== MongoDB KeyFile Init ====================
  mongo-keyfile-init:
    image: alpine:latest
    container_name: mongo-keyfile-init
    restart: "no"
    volumes:
      - ./scripts/mongo-keyfile:/src/mongo-keyfile:ro
      - mongo-keyfile:/dest
    command: sh -c "cp /src/mongo-keyfile /dest/mongo-keyfile && chown 999:999 /dest/mongo-keyfile && chmod 400 /dest/mongo-keyfile && echo 'keyfile ready'"

  # ==================== MongoDB Replica Set ====================
  mongo-primary:
    image: mongo:7.0
    container_name: mongo-primary
    hostname: mongo-primary
    restart: always
    entrypoint: ["/scripts/mongo-entrypoint.sh"]
    command: mongod --replSet rs0 --auth --bind_ip_all --port 27017 --keyFile /etc/mongo-keyfile
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "27021:27017"
    volumes:
      - mongo-primary-data:/data/db
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
      - mongo-keyfile:/etc/secrets:ro
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/27017'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-secondary:
    image: mongo:7.0
    container_name: mongo-secondary
    hostname: mongo-secondary
    restart: always
    entrypoint: ["/scripts/mongo-entrypoint.sh"]
    command: mongod --replSet rs0 --auth --bind_ip_all --port 27017 --keyFile /etc/mongo-keyfile
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-secondary-data:/data/db
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
      - mongo-keyfile:/etc/secrets:ro
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/27017'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-arbiter:
    image: mongo:7.0
    container_name: mongo-arbiter
    hostname: mongo-arbiter
    restart: always
    entrypoint: ["/scripts/mongo-entrypoint.sh"]
    command: mongod --replSet rs0 --auth --bind_ip_all --port 27017 --keyFile /etc/mongo-keyfile
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
      - mongo-keyfile:/etc/secrets:ro
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/27017'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis ====================
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==================== Zookeeper ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== Kafka Cluster (3 Brokers) ====================
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: snappy
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-2
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: snappy
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-3
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: snappy
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - infynd-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongo-primary-data:
  mongo-secondary-data:
  mongo-keyfile:
  redis-data:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  zk-data:
  zk-log:

networks:
  infynd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
